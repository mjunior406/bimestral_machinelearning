<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Cheat Project (DBSCAN Automático)</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#11141a] text-gray-200 font-sans min-h-screen flex items-center justify-center p-4">
<div class="max-w-2xl w-full bg-[#1b222c] p-6 rounded-none border-t-4 border-[#ff4655] shadow-2xl relative overflow-hidden">
  <div class="mb-6 border-b border-gray-700 pb-4">
    <h1 class="text-2xl font-black text-[#ff4655] uppercase tracking-tighter">Análise Estatística DBSCAN</h1>
    <p class="text-gray-400 text-xs uppercase tracking-widest mt-1">Dados Utilizados: Reação (ms) × Headshot (%) × Reports</p>
  </div>
  <div class="space-y-4 mb-6 bg-[#121820] p-4 border border-gray-800">
    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-2">
      <span class="w-1.5 h-1.5 bg-[#ff4655]"></span> Informar dados do jogador a analisar
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Tempo de Reação (ms):</label>
        <input type="number" id="inputX" value="15" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Taxa de HS (%):</label>
        <input type="number" id="inputY" value="98" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Reports Recebidos:</label>
        <input type="number" id="inputZ" value="30" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
      </div>
    </div>
    <button onclick="verificarJogador()" class="w-full bg-[#ff4655] hover:bg-[#e63e4b] text-white font-black py-2.5 px-4 rounded-none transition text-xs uppercase tracking-widest mt-2 border border-[#ff4655]">
      Analisar via DBSCAN
    </button>
  </div>
  <div class="border border-gray-800 bg-[#0f141c] p-4 min-h-[120px] flex flex-col justify-center">
    <div id="resultadoTerminal" class="font-mono text-xs space-y-1.5">
      <p id="statusCarregamento" class="text-yellow-500 text-center animate-pulse italic">Conectando ao servidor e baixando dataset de 1000 jogadores...</p>
    </div>
  </div>
  <div class="mt-4 pt-3 border-t border-gray-800 flex justify-between items-center text-[10px] text-gray-500 font-mono uppercase">
    <span>Algoritmo: DBSCAN (JavaScript)</span>
    <span id="contadorDados" class="text-gray-400 font-bold">Amostras carregadas: 0</span>
  </div>
</div>
</body>
<script src="script.js"></script>
</html>
