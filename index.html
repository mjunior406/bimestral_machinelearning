<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // Anti-Cheat Protocol (DBSCAN)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#11141a] text-gray-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#1b222c] p-6 rounded-none border-t-4 border-[#ff4655] shadow-2xl relative overflow-hidden">

        <div class="mb-6 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-black text-[#ff4655] uppercase tracking-tighter">Análise de possível trapaça</h1>
            <p class="text-gray-400 text-xs uppercase tracking-widest mt-1">Dados Utilizados: Reação (ms) × Headshot (%) × Reports</p>
        </div>

        <div class="space-y-4 mb-6 bg-[#121820] p-4 border border-gray-800">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-[#ff4655]"></span> Informar dados do jogador 
            </h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Tempo de Reação (ms):</label>
                    <input type="number" id="inputX" value="15" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Taxa de HS (%):</label>
                    <input type="number" id="inputY" value="98" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Reports Recebidos:</label>
                    <input type="number" id="inputZ" value="30" class="w-full bg-[#1b222c] border border-gray-700 rounded-none p-2 text-white font-mono text-sm focus:border-[#ff4655] outline-none">
                </div>
            </div>

            <button onclick="verificarJogador()" class="w-full bg-[#ff4655] hover:bg-[#e63e4b] text-white font-black py-2.5 px-4 rounded-none transition text-xs uppercase tracking-widest mt-2 border border-[#ff4655]">
                Analisar Jogador
            </button>
        </div>

        <div class="border border-gray-800 bg-[#0f141c] p-4 min-h-[120px] flex flex-col justify-center">
            <div id="resultadoTerminal" class="font-mono text-xs space-y-1.5">
                <p class="text-gray-500 text-center italic">Aguardando dados...</p>
            </div>
        </div>

        <div class="mt-4 pt-3 border-t border-gray-800 flex justify-between items-center text-[10px] text-gray-500 font-mono uppercase">
            <span>Algoritmo: DBSCAN (JavaScript)</span>
            <span id="contadorDados" class="text-gray-400 font-bold">Amostras carregadas: --</span>
        </div>
    </div>

    <script>
        // --- CORE ENGINE DO DBSCAN APLICADO A VALORANT ---
        class VanguardDBSCAN {
            constructor(eps, minPoints) {
                this.eps = eps;
                this.minPoints = minPoints;
            }

            distance3D(p1, p2) {
                return Math.sqrt(
                    Math.pow(p1.x - p2.x, 2) + 
                    Math.pow(p1.y - p2.y, 2) + 
                    Math.pow(p1.z - p2.z, 2)
                );
            }

            regionQuery(dataset, targetIdx) {
                const neighbors = [];
                for (let j = 0; j < dataset.length; j++) {
                    if (this.distance3D(dataset[targetIdx], dataset[j]) <= this.eps) {
                        neighbors.push(j);
                    }
                }
                return neighbors;
            }

            expandCluster(dataset, labels, pointIdx, neighbors, clusterId) {
                labels[pointIdx] = clusterId;
                for (let i = 0; i < neighbors.length; i++) {
                    let neighborIdx = neighbors[i];
                    if (labels[neighborIdx] === -1) labels[neighborIdx] = clusterId;
                    if (labels[neighborIdx] !== 0) continue;
                    
                    labels[neighborIdx] = clusterId;
                    let nextNeighbors = this.regionQuery(dataset, neighborIdx);
                    if (nextNeighbors.length >= this.minPoints) {
                        for (let j = 0; j < nextNeighbors.length; j++) {
                            if (!neighbors.includes(nextNeighbors[j])) {
                                neighbors.push(nextNeighbors[j]);
                            }
                        }
                    }
                }
            }

            fit(dataset) {
                const n = dataset.length;
                const labels = new Array(n).fill(0); 
                let clusterId = 0;

                for (let i = 0; i < n; i++) {
                    if (labels[i] !== 0) continue;
                    let neighbors = this.regionQuery(dataset, i);
                    if (neighbors.length < this.minPoints) {
                        labels[i] = -1; 
                    } else {
                        clusterId++;
                        this.expandCluster(dataset, labels, i, neighbors, clusterId);
                    }
                }
                return labels;
            }

            predictNewPlayer(dataset, currentLabels, newPlayer) {
                let neighbors = [];
                for (let i = 0; i < dataset.length; i++) {
                    if (this.distance3D(newPlayer, dataset[i]) <= this.eps) neighbors.push(i);
                }

                // Se cair em vácuo de densidade (Vizinhos estatísticos === 0)
                if (neighbors.length === 0) {
                    
                    // PRIORIDADE 1: VERIFICAÇÃO DE AIMBOT MECÂNICO
                    if (newPlayer.x <= 50 && newPlayer.y >= 80) {
                        return {
                            codigo: -1,
                            veredicto: "PROVÁVEL TRAPAÇA DETECTADA // AIMBOT",
                            cor: "text-[#ff4655]",
                            detalhe: "Tempo de reação e taxa de acerto de headshot fora do usual humano. Assinatura biométrica compatível com gatilhos automatizados e auxílio de mira por hardware.",
                            acao: "CONTA SUSPENSA PERMANENTEMENTE VIA VANGUARD"
                        };
                    }

                    // PRIORIDADE 2: WALLHACK POR EXCESSO DE DENÚNCIAS
                    if (newPlayer.z >= 15) {
                        return {
                            codigo: -1,
                            veredicto: "PROVÁVEL TRAPAÇA DETECTADA // WALLHACK",
                            cor: "text-[#ff4655]",
                            detalhe: "Suspeitas que o jogador esteja utilizando software auxiliar externo para obter informações privilegiadas do mapa e dos oponentes, resultando em uma taxa de denúncias anormalmente elevada.",
                            acao: "Análise manual de partidas para confirmação"
                        };
                    }

                    // CASO SEJA UM OUTLIER GENÉRICO
                    return {
                        codigo: -1,
                        veredicto: "COMPORTAMENTO ISOLADO // DESVIO DE REGULARIDADE",
                        cor: "text-yellow-500",
                        detalhe: "Dados não se encaixam em caráter conhecido, realizar novas análises com mais amostras.",
                        acao: "ISOLAR USUÁRIO EM FLAG DE MONITORAMENTO INTERNO"
                    };
                }

                let maisProximoIdx = neighbors[0];
                let menorDist = this.distance3D(newPlayer, dataset[neighbors[0]]);
                for (let k = 1; k < neighbors.length; k++) {
                    let dist = this.distance3D(newPlayer, dataset[neighbors[k]]);
                    if (dist < menorDist) {
                        menorDist = dist;
                        maisProximoIdx = neighbors[k];
                    }
                }

                const clusterPertencente = currentLabels[maisProximoIdx];
                if (clusterPertencente === -1) {
                    return {
                        codigo: -1,
                        veredicto: "PERFIL ANÔMALO // COMPORTAMENTO SUSPEITO",
                        cor: "text-yellow-500",
                        detalhe: "Comportamento suspeito mas sem evidências suficientes para alegar trapaça, seguir monitoramento.",
                        acao: "ENVIAR PARTIDAS PARA ANÁLISE COMPLEMENTAR"
                    };
                } else if (clusterPertencente === 1) {
                    return {
                        codigo: 1,
                        veredicto: "STATUS VERIFICADO // ECOSSISTEMA PADRÃO",
                        cor: "text-green-400",
                        detalhe: "Assinatura mecânica estável e perfeitamente integrada ao cluster densamente povoado de Elos Iniciais/Intermediários (Ferro ao Ouro).",
                        acao: "INTEGRIDADE CONFIRMADA // NENHUMA AÇÃO"
                    };
                } else {
                    return {
                        codigo: 2,
                        veredicto: "STATUS VERIFICADO // JOGADOR RADIANTE / ELITE",
                        cor: "text-[#00f3ff]",
                        detalhe: "Performance de altíssima precisão técnica. Padrão compatível com a zona compacta de atletas profissionais de eSports e nível Radiante.",
                        acao: "INTEGRIDADE CONFIRMADA // CONTA RECONHECIDA COMO ALTA PERFORMANCE"
                    };
                }
            }
        }

        // --- BANCO DE DADOS EXPANDIDO DO SERVIDOR ---
        const bancoServidor = [
            { x: 240, y: 15, z: 1 }, { x: 260, y: 18, z: 0 }, { x: 220, y: 22, z: 2 }, 
            { x: 270, y: 12, z: 1 }, { x: 250, y: 28, z: 3 }, { x: 235, y: 16, z: 0 }, 
            { x: 245, y: 19, z: 1 }, { x: 255, y: 21, z: 2 }, { x: 265, y: 14, z: 0 }, 
            { x: 230, y: 25, z: 1 }, { x: 275, y: 11, z: 2 }, { x: 225, y: 20, z: 4 }, 
            { x: 242, y: 17, z: 1 }, { x: 258, y: 23, z: 0 }, { x: 262, y: 13, z: 1 },
            { x: 140, y: 50, z: 2 }, { x: 150, y: 55, z: 3 }, { x: 135, y: 48, z: 1 }, 
            { x: 155, y: 52, z: 4 }, { x: 145, y: 58, z: 2 }, { x: 142, y: 51, z: 3 }, 
            { x: 138, y: 53, z: 1 }, { x: 148, y: 49, z: 2 }, { x: 152, y: 56, z: 5 }, 
            { x: 132, y: 54, z: 2 }, { x: 146, y: 47, z: 0 }, { x: 141, y: 52, z: 3 },
            { x: 15,  y: 99, z: 28 }, 
            { x: 12,  y: 96, z: 34 }, 
            { x: 142, y: 54, z: 35 }, 
            { x: 148, y: 51, z: 42 }, 
            { x: 395, y: 3,  z: 6  }, 
            { x: 410, y: 5,  z: 9  }  
        ];

        const EPSILON = 40;
        const MIN_POINTS = 4;
        const vanguard = new VanguardDBSCAN(EPSILON, MIN_POINTS);
        const rotulosServidor = vanguard.fit(bancoServidor);

        // Atualiza a interface ao carregar
        document.getElementById('contadorDados').innerText = `Amostras carregadas: ${bancoServidor.length}`;

        // --- INTERATIVIDADE DO FORMULÁRIO ---
        function verificarJogador() {
            const x = parseFloat(document.getElementById('inputX').value);
            const y = parseFloat(document.getElementById('inputY').value);
            const z = parseFloat(document.getElementById('inputZ').value);

            const jogadorTeste = { x, y, z };
            const resultado = vanguard.predictNewPlayer(bancoServidor, rotulosServidor, jogadorTeste);

            const terminal = document.getElementById('resultadoTerminal');
            terminal.innerHTML = `
                <p class="text-gray-500">// ANALISANDO DADOS COLETADOS: [REAÇÃO: ${x}ms | HS: ${y}% | REPORTS: ${z}]</p>
                <div class="pt-2">
                    <p class="font-black text-sm uppercase ${resultado.cor}">> VEREDITO: ${resultado.veredicto}</p>
                    <p class="text-gray-300 mt-1">[ANÁLISE]: ${resultado.detalhe}</p>
                    <p class="text-gray-400 font-bold mt-1 text-[11px]">> DIRETIVA DE SEGURANÇA: <span class="underline">${resultado.acao}</span></p>
                </div>
            `;
        }
    </script>
</body>
</html>
